# ============================================
# Video Insight Engine - Development
# ============================================

services:
  # ----------------------------------------
  # Infrastructure
  # ----------------------------------------

  vie-mongodb:
    image: mongo:7
    container_name: vie-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - vie_mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: video-insight-engine
    networks:
      - vie-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  vie-localstack:
    image: localstack/localstack:latest
    container_name: vie-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    volumes:
      - vie_localstack_data:/var/lib/localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: 1
    networks:
      - vie-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ----------------------------------------
  # Application Services
  # ----------------------------------------

  vie-api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: vie-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/src:ro
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://vie-mongodb:27017/video-insight-engine
      SUMMARIZER_URL: http://vie-summarizer:8000
      EXPLAINER_URL: http://vie-explainer:8001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret-change-me}
    networks:
      - vie-network
    depends_on:
      vie-mongodb:
        condition: service_healthy

  vie-summarizer:
    build:
      context: ./services/summarizer
      dockerfile: Dockerfile
    container_name: vie-summarizer
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./services/summarizer/src:/app/src:ro
      - ./services/summarizer/scripts:/app/scripts:ro
    environment:
      PYTHONUNBUFFERED: 1
      MONGODB_URI: mongodb://vie-mongodb:27017/video-insight-engine
      # Multi-provider LLM configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_FAST_PROVIDER: ${LLM_FAST_PROVIDER:-}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_FAST_MODEL: ${LLM_FAST_MODEL:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_FAST_MAX_TOKENS: ${LLM_FAST_MAX_TOKENS:-2048}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60.0}
      LLM_NUM_RETRIES: ${LLM_NUM_RETRIES:-2}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-internal-secret-change-me}
      WEBSHARE_PROXY_USERNAME: ${WEBSHARE_PROXY_USERNAME:-}
      WEBSHARE_PROXY_PASSWORD: ${WEBSHARE_PROXY_PASSWORD:-}
      # AWS S3 configuration (for transcript storage)
      TRANSCRIPT_S3_BUCKET: ${TRANSCRIPT_S3_BUCKET:-vie-transcripts}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    networks:
      - vie-network
    depends_on:
      vie-mongodb:
        condition: service_healthy
      # vie-localstack:  # Optional: uncomment if using LocalStack
      #   condition: service_healthy

  vie-explainer:
    build:
      context: ./services/explainer
      dockerfile: Dockerfile
    container_name: vie-explainer
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./services/explainer/src:/app/src:ro
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 8001
      MONGODB_URI: mongodb://vie-mongodb:27017/video-insight-engine
      # Multi-provider LLM configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_FAST_PROVIDER: ${LLM_FAST_PROVIDER:-}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_FAST_MODEL: ${LLM_FAST_MODEL:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_FAST_MAX_TOKENS: ${LLM_FAST_MAX_TOKENS:-2048}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60.0}
      LLM_NUM_RETRIES: ${LLM_NUM_RETRIES:-2}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    networks:
      - vie-network
    depends_on:
      vie-mongodb:
        condition: service_healthy

  vie-web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: vie-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/src:ro
      - ./apps/web/public:/app/public:ro
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_WS_URL: ws://localhost:3000/ws
    networks:
      - vie-network
    depends_on:
      - vie-api

# ----------------------------------------
# Networks
# ----------------------------------------

networks:
  vie-network:
    driver: bridge
    name: vie-network

# ----------------------------------------
# Volumes
# ----------------------------------------

volumes:
  vie_mongodb_data:
    name: vie_mongodb_data
  vie_localstack_data:
    name: vie_localstack_data
