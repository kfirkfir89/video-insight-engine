[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-common"
version = "0.1.0"
description = "Shared LLM usage tracking callback for VIE services"
requires-python = ">=3.11"
dependencies = [
    "litellm>=1.80.0",
    "pydantic>=2.5.0",
    "pymongo>=4.6.0",
    "motor>=3.3.0",
    "structlog>=24.0.0",
    "starlette>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
