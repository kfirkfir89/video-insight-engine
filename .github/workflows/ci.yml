name: CI

on:
  push:
    branches: [main, "dev-*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm test

  web:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - run: pnpm test

  summarizer:
    name: Summarizer Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/summarizer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/summarizer/requirements.txt

      - run: pip install -r requirements.txt

      - run: pytest

  explainer:
    name: Explainer Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/explainer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/explainer/requirements.txt

      - run: pip install -r requirements.txt

      - run: pytest
